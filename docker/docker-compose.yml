services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - backend

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.31.0
    restart: unless-stopped
    ulimits:
      memlock: -1
